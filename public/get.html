  <style>
    :root {
      --bg: #0a0a0b;
      --card: #1c1c1e;
      --card-hover: #262629;
      --border: #2e2e31;
      --text: #ffffff;
      --muted: #8e8e93;
      --accent: #ff6b35;
      --accent-2: #ff8c42;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body { height: 100%; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 600px at 50% -10%, rgba(255,107,53,0.18), transparent 60%),
        radial-gradient(800px 500px at 50% 110%, rgba(255,107,53,0.10), transparent 60%),
        var(--bg);
      min-height: 100%;
      display: flex;
      justify-content: center;
      padding: 40px 20px calc(40px + env(safe-area-inset-bottom));
    }

    .wrap {
      width: 100%;
      max-width: 440px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 22px;
      animation: rise 0.5s ease both;
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ---------- Header ---------- */
    .logo {
      width: 96px; height: 96px;
      border-radius: 22px;
      object-fit: cover;
      box-shadow: 0 14px 44px rgba(255,107,53,0.35), 0 0 0 1px var(--border);
    }

    h1 {
      font-size: 34px;
      font-weight: 800;
      letter-spacing: -0.5px;
      text-align: center;
    }
    h1 .accent { color: var(--accent); }

    .tagline {
      color: var(--muted);
      text-align: center;
      font-size: 16px;
      line-height: 1.45;
      max-width: 340px;
    }

    /* ---------- Sport strip ---------- */
    .sports {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 8px;
      margin-top: 2px;
    }
    .sports span {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 6px 9px;
      font-size: 16px;
      line-height: 1;
    }

    /* ---------- Buttons ---------- */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 6px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      width: 100%;
      min-height: 58px;
      padding: 0 18px;
      border-radius: 15px;
      font-size: 17px;
      font-weight: 700;
      text-decoration: none;
      border: 1px solid transparent;
      transition: transform 0.12s ease, background 0.15s ease, border-color 0.15s ease;
      position: relative;
    }
    .btn:active { transform: scale(0.98); }

    .btn-appstore { background: #ffffff; color: #000; }
    .btn-appstore svg { width: 20px; height: 20px; }

    .btn-web {
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      color: #fff;
      box-shadow: 0 8px 24px rgba(255,107,53,0.35);
    }

    .btn-ghost {
      background: var(--card);
      color: var(--text);
      border-color: var(--border);
    }
    .btn-ghost:hover { background: var(--card-hover); }

    .btn-disabled {
      background: transparent;
      color: var(--muted);
      border-color: var(--border);
      cursor: default;
    }
    .btn-disabled:active { transform: none; }

    .pill {
      position: absolute;
      right: 14px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(255,107,53,0.12);
      border: 1px solid rgba(255,107,53,0.3);
      padding: 3px 8px;
      border-radius: 999px;
    }

    .sub { font-size: 12px; font-weight: 600; color: var(--muted); }

    /* ---------- Footer ---------- */
    footer {
      margin-top: 14px;
      text-align: center;
      color: var(--muted);
      font-size: 12.5px;
      line-height: 1.5;
    }
    footer a { color: var(--muted); text-decoration: underline; text-underline-offset: 2px; }
  </style>
</head>
